# Config Nginx - cadbrasil.com.br
# Última atualização: 29/01/2026
#
# Fluxo de redirecionamento:
#   http://www.cadbrasil.com.br/*  -> 301 -> https://cadbrasil.com.br/*
#   https://www.cadbrasil.com.br/* -> 301 -> https://cadbrasil.com.br/*
#   http://cadbrasil.com.br/*      -> 301 -> https://cadbrasil.com.br/*
#   https://cadbrasil.com.br/*     -> serve o site

server
{
    listen 80;
    server_name cadbrasil.com.br www.cadbrasil.com.br;
    index index.html index.htm default.htm default.html;

    root /www/wwwroot/cadbrasil/dist;

    #CERT-APPLY-CHECK--START
    include /www/server/panel/vhost/nginx/well-known/cadbrasil.conf;
    #CERT-APPLY-CHECK--END

    # Redirecionar www para não-www (opcional; se preferir o contrário, inverta)
    if ($host = www.cadbrasil.com.br) {
        return 301 https://cadbrasil.com.br$request_uri;
    }

    #HTTP_TO_HTTPS

    #REWRITE-START
    include /www/server/panel/vhost/rewrite/node_cadbrasil.conf;
    #REWRITE-END

    location ~ ^/(\.user.ini|\.htaccess|\.git|\.svn|\.project|LICENSE|README.md|package.json|package-lock.json|\.env|node_modules) {
        return 404;
    }

    # Renovação SSL (Let's Encrypt) - arquivos em .well-known no root do site
    location /.well-known/ {
        root /www/wwwroot/cadbrasil;
        allow all;
    }

    # API Backend - Proxy para Node.js na porta 3013
    location /api/ {
        proxy_pass http://127.0.0.1:3013;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 30s;
        proxy_read_timeout 86400s;
        proxy_send_timeout 30s;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    location /health {
        proxy_pass http://127.0.0.1:3013;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Cache longo para assets estáticos
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
    }

    # SPA - fallback para index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    access_log  /www/wwwlogs/cadbrasil.log;
    error_log   /www/wwwlogs/cadbrasil.error.log;
}
